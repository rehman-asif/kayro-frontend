[build]
  base = "/"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy API to Railway so auth cookies are first-party on Netlify
[[redirects]]
  from = "/api/*"
  to = "https://kayro-backend-production.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
